events {
    worker_connections 1024;
}

http {
    # Docker embedded DNS — re-resolves fleet-api on every request so
    # recreating the fleet-api container doesn't leave nginx with a stale IP.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Allow firmware uploads up to 20 MB through /api/firmware/.
    client_max_body_size 20M;

    # --- HTTP :80 — kept for firmware + backwards compat during transition ---
    server {
        listen 80;
        server_name mdmfleetmanagment.homeadapt.us localhost _;

        location /api/ {
            set $fleet_api "fleet-api";
            proxy_pass http://$fleet_api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ws/ {
            set $fleet_api "fleet-api";
            proxy_pass http://$fleet_api:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        location /health {
            set $fleet_api "fleet-api";
            proxy_pass http://$fleet_api:8000/health;
        }

        location /admin {
            set $fleet_api "fleet-api";
            proxy_pass http://$fleet_api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect http://$host/ /;
        }

        location /grafana/ {
            set $grafana "grafana";
            proxy_pass http://$grafana:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /firmware/ {
            alias /usr/share/nginx/firmware/;
            autoindex off;
        }
    }

    # --- HTTPS :443 — Cloudflare Origin cert terminates TLS ---
    server {
        listen 443 ssl;
        http2 on;
        server_name mdmfleetmanagment.homeadapt.us;

        ssl_certificate     /etc/nginx/ssl/homeadapt.crt;
        ssl_certificate_key /etc/nginx/ssl/homeadapt.key;
        ssl_dhparam         /etc/nginx/ssl/dhparam.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        add_header Strict-Transport-Security "max-age=31536000" always;

        location /api/ {
            set $fleet_api "fleet-api";
            proxy_pass http://$fleet_api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ws/ {
            set $fleet_api "fleet-api";
            proxy_pass http://$fleet_api:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        location /health {
            set $fleet_api "fleet-api";
            proxy_pass http://$fleet_api:8000/health;
        }

        location /admin {
            set $fleet_api "fleet-api";
            proxy_pass http://$fleet_api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect http://$host/ /;
            # Dashboard HTML/JS changes often — stop browsers/CF from
            # serving stale assets and leaving users stuck on the
            # previous login flow.
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
        }

        # ── Single-sign-on for Grafana ───────────────────────────────
        # Internal subrequest target. Calls fleet-api /api/auth/verify
        # which checks the mdm_session cookie. Returns 200 + X-Auth-User
        # header on success; 401 on failure.
        location = /_auth_verify {
            internal;
            set $fleet_api "fleet-api";
            proxy_pass http://$fleet_api:8000/api/auth/verify;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Host $host;
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header Cookie $http_cookie;
        }

        # If verify fails, bounce the user to /admin/ to log in.
        location @login_redirect {
            return 302 /admin/;
        }

        location /grafana/ {
            auth_request /_auth_verify;
            auth_request_set $auth_user $upstream_http_x_auth_user;
            error_page 401 = @login_redirect;

            set $grafana "grafana";
            proxy_pass http://$grafana:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Grafana auth.proxy reads this; auto-creates user on first visit
            proxy_set_header X-WEBAUTH-USER $auth_user;
        }

        # Grafana live + websocket channel — same SSO check
        location /grafana/api/live/ {
            auth_request /_auth_verify;
            auth_request_set $auth_user $upstream_http_x_auth_user;
            error_page 401 = @login_redirect;

            set $grafana "grafana";
            proxy_pass http://$grafana:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-WEBAUTH-USER $auth_user;
        }

        location /firmware/ {
            alias /usr/share/nginx/firmware/;
            autoindex off;
        }
    }
}

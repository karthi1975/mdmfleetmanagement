events {
    worker_connections 1024;
}

http {
    upstream fleet_api {
        server fleet-api:8000;
    }

    # --- HTTP :80 — kept for firmware + backwards compat during transition ---
    server {
        listen 80;
        server_name mdmfleetmanagment.homeadapt.us localhost _;

        location /api/ {
            proxy_pass http://fleet_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ws/ {
            proxy_pass http://fleet_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        location /health {
            proxy_pass http://fleet_api/health;
        }

        location /firmware/ {
            alias /usr/share/nginx/firmware/;
            autoindex off;
        }
    }

    # --- HTTPS :443 — Cloudflare Origin cert terminates TLS ---
    server {
        listen 443 ssl;
        http2 on;
        server_name mdmfleetmanagment.homeadapt.us;

        ssl_certificate     /etc/nginx/ssl/homeadapt.crt;
        ssl_certificate_key /etc/nginx/ssl/homeadapt.key;
        ssl_dhparam         /etc/nginx/ssl/dhparam.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        add_header Strict-Transport-Security "max-age=31536000" always;

        location /api/ {
            proxy_pass http://fleet_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ws/ {
            proxy_pass http://fleet_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        location /health {
            proxy_pass http://fleet_api/health;
        }

        location /firmware/ {
            alias /usr/share/nginx/firmware/;
            autoindex off;
        }
    }
}

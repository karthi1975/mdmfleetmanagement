# --- plain MQTT 1883 (kept temporarily during TLS migration) ---
listener 1883
allow_anonymous true

# --- MQTTS 8883 (TLS, CF Origin cert) ---
listener 8883
allow_anonymous true
cafile   /mosquitto/certs/origin_ca_rsa_root.crt
certfile /mosquitto/certs/homeadapt.crt
keyfile  /mosquitto/certs/homeadapt.key
tls_version tlsv1.2
require_certificate false

persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type all

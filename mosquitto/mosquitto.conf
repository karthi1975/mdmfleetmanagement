per_listener_settings true

# --- plain MQTT 1883 (internal docker network + legacy external; auth required) ---
listener 1883
allow_anonymous false
password_file /mosquitto/config/passwd

# --- MQTTS 8883 (TLS + auth for external clients) ---
listener 8883
allow_anonymous false
password_file /mosquitto/config/passwd
cafile   /mosquitto/certs/origin_ca_rsa_root.crt
certfile /mosquitto/certs/homeadapt.crt
keyfile  /mosquitto/certs/homeadapt.key
tls_version tlsv1.2
require_certificate false

persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type all

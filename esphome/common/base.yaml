# Shared config included by all ESP32 devices via packages.
# Provides: MQTT heartbeat (30s), registration on boot, OTA, logger.
# Device-specific YAML sets substitutions: device_name, device_role, firmware_version.
# Uses ESPHome native API — compatible with both ESP-IDF and Arduino frameworks.

substitutions:
  firmware_version: "1.0.0"

external_components:
  - source:
      type: local
      path: ../components

esphome:
  name: ${device_name}
  includes: []
  on_boot:
    priority: -100
    then:
      - wait_until:
          condition:
            lambda: 'return id(mqtt_client).is_connected();'
      - delay: 1s
      - mqtt.publish:
          topic: "fleet/${device_name}/register"
          qos: 1
          retain: true
          payload: !lambda |-
            return "{\"mac\":\"" + get_mac_address_pretty() +
                   "\",\"version\":\"${firmware_version}\"" +
                   ",\"role\":\"${device_role}\"}";

mqtt:
  id: mqtt_client
  broker: !secret mqtt_broker
  port: 8883
  username: !secret mqtt_username
  password: !secret mqtt_password
  certificate_authority: !secret mqtt_ca_certificate
  topic_prefix: "fleet/${device_name}"
  birth_message:
    topic: "fleet/${device_name}/status"
    payload: "online"
  will_message:
    topic: "fleet/${device_name}/status"
    payload: "offline"

interval:
  - interval: 30s
    then:
      - mqtt.publish:
          topic: "fleet/${device_name}/heartbeat"
          payload: !lambda |-
            int rssi = 0;
            if (!std::isnan(id(wifi_rssi).state)) {
              rssi = (int)id(wifi_rssi).state;
            }
            char buf[128];
            snprintf(buf, sizeof(buf),
              "{\"uptime\":%u,\"heap\":%u,\"rssi\":%d}",
              (unsigned)(millis() / 1000),
              (unsigned)heap_caps_get_free_size(MALLOC_CAP_8BIT),
              rssi);
            return std::string(buf);

sensor:
  - platform: wifi_signal
    id: wifi_rssi
    name: "${device_name} WiFi Signal"
    update_interval: 30s
    internal: true

ota:
  - platform: esphome
    password: !secret ota_password

# MQTT-triggered HTTP OTA — subscribes to fleet/{device}/ota/cmd
mqtt_ota:

logger:
  level: INFO
  logs:
    mqtt: INFO
    wifi: WARN
  # Central logging (Req 3): ESPHome logs forwarded via MQTT topic
  # Fleet server subscribes to fleet/{device}/log and pushes to Loki

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Never reboot just because WiFi is missing — at first install the
  # device must stay alive in AP mode indefinitely so the installer
  # can reach the captive portal. After provisioning, ESPHome persists
  # the real credentials in NVS and uses them on subsequent boots.
  reboot_timeout: 0s
  power_save_mode: none
  ap:
    ssid: "${device_name}-fallback"
    password: !secret ap_password
    # ap_timeout is the time STA retries BEFORE enabling the fallback AP.
    # 30s: fail fast so the installer doesn't wait forever at a new site.
    ap_timeout: 30s

# Serves a simple page at http://192.168.4.1/ while the device is
# running as an AP, letting the installer pick the home's WiFi and
# enter the password. Auto-saves to NVS.
captive_portal:

# Factory reset — long-press the BOOT button (GPIO0) for 10s to wipe
# saved WiFi creds and put the device back into on-boarding mode.
# Useful when moving a device to a new home.
binary_sensor:
  - platform: gpio
    id: boot_button
    pin:
      number: GPIO0
      inverted: true
      mode:
        input: true
        pullup: true
    on_click:
      min_length: 10s
      max_length: 30s
      then:
        - button.press: factory_reset_btn

button:
  - platform: factory_reset
    id: factory_reset_btn
    name: "${device_name} Factory reset"

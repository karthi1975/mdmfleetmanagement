# Shared config included by all ESP32 devices via packages.
# Provides: MQTT heartbeat (30s), registration on boot, OTA, logger.
# Device-specific YAML sets substitutions: device_name, device_role, firmware_version.
# Uses ESPHome native API — compatible with both ESP-IDF and Arduino frameworks.

substitutions:
  firmware_version: "1.0.0"

external_components:
  - source:
      type: local
      path: ../components

esphome:
  name: ${device_name}
  # Suffix ${device_name} with the last 6 hex digits of the WiFi MAC at
  # runtime, so each physical chip registers as its own device_id
  # (e.g. esp32-test-fa48d0). Without this every board flashed from the
  # same image collides on the same device_id row.
  name_add_mac_suffix: true
  includes: []
  on_boot:
    priority: -100
    then:
      - wait_until:
          condition:
            lambda: 'return id(mqtt_client).is_connected();'
      - delay: 1s
      - mqtt.publish:
          topic: !lambda 'return "fleet/" + App.get_name() + "/register";'
          qos: 1
          # retain: false — a retained register replays to fleet-api on
          # every restart and silently overwrites any admin edits to
          # home_id / display_name / custom_id. The register fires on
          # every boot anyway, so the broker doesn't need to cache it.
          retain: false
          payload: !lambda |-
            auto &pp = *id(provision);
            return std::string("{\"mac\":\"") + get_mac_address_pretty() +
                   "\",\"version\":\"${firmware_version}\"" +
                   ",\"role\":\"${device_role}\"" +
                   ",\"home_id\":\"" + pp.get_home_id() + "\"" +
                   ",\"label\":\"" + pp.get_device_label() + "\"" +
                   ",\"custom_id\":\"" + pp.get_custom_id() + "\"}";

mqtt:
  id: mqtt_client
  broker: !secret mqtt_broker
  port: 8883
  username: !secret mqtt_username
  password: !secret mqtt_password
  certificate_authority: !secret mqtt_ca_certificate
  # No topic_prefix / birth / will here — MQTT_MESSAGE_SCHEMA doesn't
  # accept lambdas, and compile-time topics would collide across chips
  # that share the same compiled device_name. Every publish below uses
  # a lambda built from App.get_name() (mac-suffixed), and fleet-api
  # tracks alive/dead via the 30s heartbeat instead of birth/will.

interval:
  - interval: 30s
    then:
      - mqtt.publish:
          topic: !lambda 'return "fleet/" + App.get_name() + "/heartbeat";'
          payload: !lambda |-
            int rssi = 0;
            if (!std::isnan(id(wifi_rssi).state)) {
              rssi = (int)id(wifi_rssi).state;
            }
            char buf[128];
            snprintf(buf, sizeof(buf),
              "{\"uptime\":%u,\"heap\":%u,\"rssi\":%d}",
              (unsigned)(millis() / 1000),
              (unsigned)heap_caps_get_free_size(MALLOC_CAP_8BIT),
              rssi);
            return std::string(buf);

sensor:
  - platform: wifi_signal
    id: wifi_rssi
    name: "${device_name} WiFi Signal"
    update_interval: 30s
    internal: true

ota:
  - platform: esphome
    password: !secret ota_password

# MQTT-triggered HTTP OTA — subscribes to fleet/{device}/ota/cmd
mqtt_ota:

logger:
  level: INFO
  logs:
    mqtt: INFO
    wifi: WARN
  # Central logging (Req 3): ESPHome logs forwarded via MQTT topic
  # Fleet server subscribes to fleet/{device}/log and pushes to Loki

wifi:
  # No compiled-in ssid/password on purpose. ESPHome keys the NVS
  # preference for saved wifi creds under get_config_version_hash() when
  # has_sta() is true (any compiled-in network), and under the constant
  # 88491487UL when it's false. Any YAML change — including a
  # firmware_version bump — rotates config_version_hash and orphans
  # prior captive-portal-saved creds, which is why devices used to
  # fall back to AP mode after every OTA. Omitting ssid/password keeps
  # has_sta() false at boot, so NVS is keyed under the stable constant
  # and captive-portal creds survive across firmware versions.
  reboot_timeout: 0s
  power_save_mode: none
  ap:
    ssid: "${device_name}-onboard"
    password: !secret ap_password
    # ap_timeout is the time STA retries BEFORE enabling the fallback AP.
    # 30s: fail fast so the installer doesn't wait forever at a new site.
    ap_timeout: 30s

# Serves a simple page at http://192.168.4.1/ while the device is
# running as an AP. The custom form collects WiFi creds + home_id +
# device label and persists them to NVS at a stable hash so values
# survive OTAs (see esphome/components/provision_portal/). The
# component also ships a wildcard DNS server so phones auto-pop
# the sign-in browser on connect.
provision_portal:
  id: provision

# Factory reset — long-press the BOOT button (GPIO0) for 10s to wipe
# saved WiFi creds and put the device back into on-boarding mode.
# Useful when moving a device to a new home.
binary_sensor:
  - platform: gpio
    id: boot_button
    pin:
      number: GPIO0
      inverted: true
      mode:
        input: true
        pullup: true
    on_click:
      min_length: 10s
      max_length: 30s
      then:
        - button.press: factory_reset_btn

button:
  - platform: factory_reset
    id: factory_reset_btn
    name: "${device_name} Factory reset"

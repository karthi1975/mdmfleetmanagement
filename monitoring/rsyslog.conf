# Receive syslog from ESP32 devices via UDP
module(load="imudp")
input(type="imudp" port="514")

# Template for Loki-friendly output
template(name="LokiFormat" type="string"
  string="%HOSTNAME% %syslogtag%%msg%\n")

# Write all incoming syslog to file (Promtail or Loki syslog receiver picks up)
*.* /var/log/fleet/devices.log;LokiFormat

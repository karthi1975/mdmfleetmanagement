apiVersion: 1
datasources:
  - name: FleetDB
    type: postgres
    access: proxy
    url: postgres:5432
    user: fleet
    database: fleet_db
    secureJsonData:
      password: fleet_secret
    jsonData:
      sslmode: disable
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 14400
      postgresVersion: 1600
      timescaledb: false
    isDefault: false
    editable: false
